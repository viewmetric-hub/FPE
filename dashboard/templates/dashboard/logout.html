<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Logging out…</title>
</head>
<body>
<script>
(function () {
  var refreshToken = localStorage.getItem('refreshToken');
    function goLogin() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        window.location.replace('/login/');
    }
  if (refreshToken) {
    fetch('/api/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh: refreshToken })
    }).catch(function () {}).finally(goLogin);
  } else {
    goLogin();
  }
})();
</script>
<p style="font-family:system-ui,sans-serif;padding:1rem;">Signing you out…</p>
</body>
</html>
